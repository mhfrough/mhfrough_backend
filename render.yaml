services:
  - type: web
    name: mhfrough-backend
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/main
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3032
      # Supabase Postgres (Shared Pooler — session mode, port 5432)
      - key: DB_HOST
        value: aws-1-us-west-2.pooler.supabase.com
      - key: DB_PORT
        value: 5432
      - key: DB_USERNAME
        value: postgres.pkyetzmjjvmyrztuboto
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        value: postgres
      - key: DB_SSL
        value: 'true'
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: COOKIE_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: https://mhfrough-frontend.onrender.com
